<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hien Luong — Backend Engineer</title>
  </head>
  <body>

    <!-- ══ Navbar ══ -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="nav-inner">
        <span class="nav-logo">hien<span>luong</span>.is-a.dev</span>

        <ul class="nav-links" role="list">
          <li><a href="#profile">About me</a></li>
          <li><a href="#experience">Experience</a></li>
          <li><a href="#education">Education</a></li>
          <li><a href="#skills">Skills</a></li>
        </ul>

        <div class="nav-right">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
            <!-- Sun icon (shown in light mode) -->

              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
            <!-- Moon icon (shown in dark mode) -->
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main>
      <div class="container">

        <!-- ══ Hero / Profile — populated by loadPortfolio() ══ -->
        <section class="hero" id="profile" aria-label="Profile">
          <div id="profile-content"></div>
        </section>

        <!-- ══ Work Experience ══ -->
        <section class="section reveal" id="experience" aria-labelledby="exp-heading">
          <div class="section-header">
            <div class="section-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z" />
              </svg>
            </div>
            <h2 class="section-title" id="exp-heading">Work Experience</h2>
            <div class="section-divider" aria-hidden="true"></div>
          </div>

          <!-- populated by loadPortfolio() -->
          <div class="experience-list" id="experience-list">
          </div>
        </section>

        <!-- ══ Tech Skills ══ -->
        <section class="section reveal" id="skills" aria-labelledby="skills-heading">
          <div class="section-header">
            <div class="section-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
              </svg>
            </div>
            <h2 class="section-title" id="skills-heading">Tech Skills</h2>
            <div class="section-divider" aria-hidden="true"></div>
          </div>

          <div class="skills-grid" id="skills-content"></div>
        </section>

        <!-- ══ Education ══ -->
        <section class="section reveal" id="education" aria-labelledby="edu-heading">
          <div class="section-header">
            <div class="section-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
              </svg>
            </div>
            <h2 class="section-title" id="edu-heading">Education</h2>
            <div class="section-divider" aria-hidden="true"></div>
          </div>

          <div id="education-content"></div>
        </section>

      </div><!-- /.container -->
    </main>

    <footer>
      <p class="footer-text">
        Built with <strong>TypeScript + Vite + Claude</strong> &mdash; &copy; 2026 Hien Luong
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
